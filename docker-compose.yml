version: '3.8'

services:
  # MySQL Service
  mysql:
    image: mysql:8.0
    container_name: medio-mysql
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ecommerce_db
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
      MYSQL_USER: user
    volumes:
      - mysql-data:/var/lib/mysql

  # Backend Service (Laravel)
  backend:
    build:
      context: ./medio-be
      dockerfile: Dockerfile
    container_name: medio-backend
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: backend
      SERVICE_TAGS: dev
    working_dir: /var/www/html
    volumes:
      - ./medio-be:/var/www/html
    depends_on:
      - mysql

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: medio-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80"
    volumes:
      - ./medio-be:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  # Frontend Service (Vue)
  frontend:
    build:
      context: ./medio-fe
      dockerfile: Dockerfile
    container_name: medio-frontend
    restart: unless-stopped
    tty: true
    ports:
      - "5173:5173"
    volumes:
      - ./medio-fe:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql-data:
    driver: local
